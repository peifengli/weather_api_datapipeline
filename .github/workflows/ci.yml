name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:  # allows cd.yml to call this as a reusable workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  AWS_DEFAULT_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  ENVIRONMENT: local

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff black mypy boto3-stubs[s3,secretsmanager,glue] types-requests
      - run: ruff check src/ tests/
      - run: black --check src/ tests/
      - run: mypy src/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/unit/ -v --tb=short -m unit --cov=src --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage.xml

  integration-tests:
    name: Integration Tests (moto)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/integration/ -v --tb=short -m integration

  data-quality-tests:
    name: Data Quality Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/data_quality/ -v --tb=short -m data_quality

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/
      - name: Terraform init (offline)
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate
