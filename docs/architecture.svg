<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" width="960" height="340" role="img" aria-label="Tri-State Weather Pipeline Architecture">
  <style>
    /* ── Base ────────────────────────────────────────────────────────────── */
    .bg   { fill: #0d1117; }
    .card { fill: #161b22; stroke-width: 1.5; rx: 10; }
    .lbl  { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; fill: #e6edf3; font-size: 11px; text-anchor: middle; dominant-baseline: middle; }
    .sub  { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; fill: #8b949e; font-size: 9px; text-anchor: middle; dominant-baseline: middle; }
    .head { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; fill: #58a6ff; font-size: 13px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    .pipe { fill: none; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 8 6; }

    /* ── Node accent colors ─────────────────────────────────────────────── */
    .c-api   { stroke: #3fb950; }
    .c-orch  { stroke: #d29922; }
    .c-ingest{ stroke: #f78166; }
    .c-store { stroke: #58a6ff; }
    .c-proc  { stroke: #bc8cff; }
    .c-serve { stroke: #39d353; }
    .c-obs   { stroke: #e3b341; }

    /* ── Animated flow along each pipe ─────────────────────────────────── */
    @keyframes flow {
      0%   { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0;   }
    }
    .p-api    { animation: flow 2.0s linear infinite; }
    .p-sched  { animation: flow 2.4s linear infinite; }
    .p-ingest { animation: flow 1.8s linear infinite; animation-delay: 0.3s; }
    .p-raw    { animation: flow 2.0s linear infinite; animation-delay: 0.6s; }
    .p-proc   { animation: flow 2.0s linear infinite; animation-delay: 0.9s; }
    .p-serve  { animation: flow 2.2s linear infinite; animation-delay: 1.2s; }
    .p-cicd   { animation: flow 3.0s linear infinite; animation-delay: 0.5s; stroke-dasharray: 5 8; }

    /* ── Icon circles ───────────────────────────────────────────────────── */
    .icon-bg { r: 14; }
    .icon-txt { font-size: 13px; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <!-- Background -->
  <rect class="bg" width="960" height="340" rx="12"/>

  <!-- Title -->
  <text class="head" x="480" y="22">Tri-State Weather Data Pipeline</text>

  <!-- ── Divider labels ─────────────────────────────────────────────────── -->
  <!-- Top row: step labels -->
  <text class="sub" x="58"  y="50">External API</text>
  <text class="sub" x="200" y="50">Orchestration</text>
  <text class="sub" x="340" y="50">Ingestion</text>
  <text class="sub" x="480" y="50">Storage</text>
  <text class="sub" x="620" y="50">Transform</text>
  <text class="sub" x="780" y="50">Serving</text>
  <text class="sub" x="906" y="50">Observe</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       NODES  (x=center, y=center, width=96, height=70)
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- OpenWeatherMap -->
  <rect class="card c-api"   x="10"  y="65" width="96" height="70" rx="10"/>
  <text x="58" y="87" class="icon-txt">🌦️</text>
  <text class="lbl" x="58"  y="108">OpenWeather</text>
  <text class="sub" x="58"  y="122">Map API</text>

  <!-- EventBridge -->
  <rect class="card c-orch"  x="152" y="65" width="96" height="70" rx="10"/>
  <text x="200" y="87" class="icon-txt">⏱</text>
  <text class="lbl" x="200" y="108">EventBridge</text>
  <text class="sub" x="200" y="122">30 min</text>

  <!-- Lambda -->
  <rect class="card c-orch"  x="152" y="155" width="96" height="60" rx="10"/>
  <text x="200" y="174" class="icon-txt">λ</text>
  <text class="lbl" x="200" y="194">Lambda</text>
  <text class="sub" x="200" y="207">Trigger</text>

  <!-- Secrets Manager -->
  <rect class="card c-api"   x="152" y="235" width="96" height="60" rx="10"/>
  <text x="200" y="253" class="icon-txt">🔑</text>
  <text class="lbl" x="200" y="271">Secrets Mgr</text>
  <text class="sub" x="200" y="284">API Key</text>

  <!-- fetch_weather Glue -->
  <rect class="card c-ingest" x="292" y="65" width="96" height="70" rx="10"/>
  <text x="340" y="87" class="icon-txt">⚙️</text>
  <text class="lbl" x="340" y="108">fetch_weather</text>
  <text class="sub" x="340" y="122">Glue · PySpark</text>

  <!-- Raw S3 -->
  <rect class="card c-store"  x="432" y="65" width="96" height="70" rx="10"/>
  <text x="480" y="87" class="icon-txt">🪣</text>
  <text class="lbl" x="480" y="108">Raw S3</text>
  <text class="sub" x="480" y="122">JSON</text>

  <!-- process_weather Glue -->
  <rect class="card c-proc"   x="432" y="165" width="96" height="70" rx="10"/>
  <text x="480" y="187" class="icon-txt">⚙️</text>
  <text class="lbl" x="480" y="208">process_weather</text>
  <text class="sub" x="480" y="221">Glue · PySpark</text>

  <!-- Processed S3 -->
  <rect class="card c-store"  x="572" y="65" width="96" height="70" rx="10"/>
  <text x="620" y="87" class="icon-txt">🪣</text>
  <text class="lbl" x="620" y="108">Processed S3</text>
  <text class="sub" x="620" y="122">Parquet (hive)</text>

  <!-- Athena / Glue Catalog -->
  <rect class="card c-proc"   x="572" y="165" width="96" height="70" rx="10"/>
  <text x="620" y="187" class="icon-txt">🔍</text>
  <text class="lbl" x="620" y="208">Athena</text>
  <text class="sub" x="620" y="221">Glue Catalog</text>

  <!-- ALB -->
  <rect class="card c-serve"  x="712" y="65" width="96" height="70" rx="10"/>
  <text x="760" y="87" class="icon-txt">⚖️</text>
  <text class="lbl" x="760" y="108">ALB</text>
  <text class="sub" x="760" y="122">HTTP :80  WebSocket</text>

  <!-- ECS Fargate -->
  <rect class="card c-serve"  x="712" y="165" width="96" height="70" rx="10"/>
  <text x="760" y="187" class="icon-txt">🐳</text>
  <text class="lbl" x="760" y="208">ECS Fargate</text>
  <text class="sub" x="760" y="221">Streamlit :8501</text>

  <!-- ECR -->
  <rect class="card c-serve"  x="852" y="65" width="96" height="70" rx="10"/>
  <text x="900" y="87" class="icon-txt">📦</text>
  <text class="lbl" x="900" y="108">ECR</text>
  <text class="sub" x="900" y="122">Docker image</text>

  <!-- CloudWatch -->
  <rect class="card c-obs"    x="852" y="165" width="96" height="70" rx="10"/>
  <text x="900" y="187" class="icon-txt">📊</text>
  <text class="lbl" x="900" y="208">CloudWatch</text>
  <text class="sub" x="900" y="221">Logs · 7d</text>

  <!-- GitHub Actions (bottom) -->
  <rect class="card c-cicd"   x="712" y="260" width="96" height="60" rx="10"/>
  <text x="760" y="278" class="icon-txt">🐙</text>
  <text class="lbl" x="760" y="298">GitHub Actions</text>
  <text class="sub" x="760" y="311">CI / CD</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       PIPES — animated dashes
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- API → fetch (horizontal) -->
  <line class="pipe c-api p-api"     x1="106" y1="100" x2="292" y2="100"/>

  <!-- EventBridge → Lambda (vertical) -->
  <line class="pipe c-orch p-sched"  x1="200" y1="135" x2="200" y2="155"/>

  <!-- Lambda → fetch (diagonal zig) -->
  <polyline class="pipe c-orch p-sched" points="248,185 270,185 270,100 292,100" fill="none"/>

  <!-- Secrets → fetch (diagonal zig) -->
  <polyline class="pipe c-api p-api"   points="248,265 270,265 270,130 292,130" fill="none"/>

  <!-- fetch → Raw S3 -->
  <line class="pipe c-ingest p-ingest" x1="388" y1="100" x2="432" y2="100"/>

  <!-- Raw S3 → process_weather (zig-down) -->
  <polyline class="pipe c-store p-raw"  points="480,135 480,165" fill="none"/>

  <!-- process_weather → Processed S3 (zig-up-right) -->
  <polyline class="pipe c-proc p-proc"  points="528,200 550,200 550,100 572,100" fill="none"/>

  <!-- Processed S3 → Athena (vertical via middle) -->
  <polyline class="pipe c-proc p-proc"  points="620,135 620,165" fill="none"/>

  <!-- Processed S3 → ALB (horizontal) -->
  <line class="pipe c-store p-serve"   x1="668" y1="100" x2="712" y2="100"/>

  <!-- ALB → ECS (vertical) -->
  <line class="pipe c-serve p-serve"   x1="760" y1="135" x2="760" y2="165"/>

  <!-- ECS → CloudWatch (horizontal) -->
  <line class="pipe c-obs p-serve"     x1="808" y1="200" x2="852" y2="200"/>

  <!-- ECR → ECS (vertical) -->
  <line class="pipe c-serve p-cicd"    x1="900" y1="135" x2="900" y2="165"/>
  <!-- vertical line to align: ECR bottom to ECS-level -->
  <polyline class="pipe c-serve p-cicd" points="900,165 808,200" fill="none"/>

  <!-- GitHub → ECR (vertical up) -->
  <polyline class="pipe c-serve p-cicd" points="760,260 760,245 900,245 900,135" fill="none"/>

  <!-- ── Legend ─────────────────────────────────────────────────────────── -->
  <rect x="10" y="300" width="580" height="30" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="30" cy="315" r="5" fill="#3fb950"/><text class="sub" x="60"  y="316">API / Auth</text>
  <circle cx="120" cy="315" r="5" fill="#d29922"/><text class="sub" x="150" y="316">Orchestration</text>
  <circle cx="220" cy="315" r="5" fill="#f78166"/><text class="sub" x="255" y="316">Ingestion</text>
  <circle cx="310" cy="315" r="5" fill="#58a6ff"/><text class="sub" x="340" y="316">Storage</text>
  <circle cx="380" cy="315" r="5" fill="#bc8cff"/><text class="sub" x="415" y="316">Processing</text>
  <circle cx="460" cy="315" r="5" fill="#39d353"/><text class="sub" x="495" y="316">Serving</text>
  <circle cx="535" cy="315" r="5" fill="#e3b341"/><text class="sub" x="562" y="316">Observe</text>
</svg>
